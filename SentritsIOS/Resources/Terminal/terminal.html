<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Vibe Terminal</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1616;
      --fg: #f8e9d5;
      --cursor: #f0b061;
      --selection: rgba(240, 176, 97, 0.28);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(15, 38, 59, 0.1), transparent 38%),
        linear-gradient(180deg, #0b1616 0%, #0b1616 100%);
      font-family: "SF Mono", Menlo, monospace;
    }

    #terminal {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 10px;
    }

    .xterm {
      height: 100%;
    }

    .xterm-viewport {
      scrollbar-width: none;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="xterm.js"></script>
  <script src="addon-fit.js"></script>
  <script>
    const host = document.getElementById('terminal');
    const terminal = new Terminal({
      allowTransparency: true,
      convertEol: false,
      cursorBlink: false,
      cursorStyle: 'block',
      fontFamily: 'SF Mono, Menlo, monospace',
      fontSize: 14,
      scrollback: 5000,
      theme: {
        background: '#0b1616',
        foreground: '#f8e9d5',
        cursor: '#f0b061',
        selectionBackground: 'rgba(240, 176, 97, 0.28)'
      }
    });
    const fitAddon = new FitAddon.FitAddon();
    let inputEnabled = false;
    let lastReportedCols = 0;
    let lastReportedRows = 0;
    let activeBootstrapToken = 0;
    let modeState = {
      reportResize: false,
      fixedCols: 0,
      fixedRows: 0,
    };

    terminal.loadAddon(fitAddon);
    terminal.open(host);

    function pinHelperTextarea() {
      const textarea = terminal.textarea;
      if (!textarea) {
        return;
      }
      textarea.style.setProperty('position', 'fixed', 'important');
      textarea.style.setProperty('left', '0px', 'important');
      textarea.style.setProperty('top', '0px', 'important');
      textarea.style.setProperty('width', '1px', 'important');
      textarea.style.setProperty('height', '1px', 'important');
      textarea.style.setProperty('opacity', '0', 'important');
      textarea.style.setProperty('transform', 'translate(-10000px, -10000px)', 'important');
      textarea.style.setProperty('pointer-events', 'none', 'important');
      textarea.style.setProperty('z-index', '-1', 'important');
      textarea.style.setProperty('caret-color', 'transparent', 'important');
    }

    function postMessage(name, payload) {
      const handler = window.webkit?.messageHandlers?.[name];
      if (handler) {
        handler.postMessage(payload);
      }
    }

    function fitAndReport() {
      if (!modeState.reportResize) {
        return;
      }
      if (host.clientWidth <= 0 || host.clientHeight <= 0) {
        return;
      }
      fitAddon.fit();
      if (terminal.cols <= 0 || terminal.rows <= 0) {
        return;
      }
      if (terminal.cols === lastReportedCols && terminal.rows === lastReportedRows) {
        return;
      }
      lastReportedCols = terminal.cols;
      lastReportedRows = terminal.rows;
      postMessage('terminalResize', { cols: terminal.cols, rows: terminal.rows });
    }

    function decodeBase64(base64) {
      const raw = atob(base64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i += 1) {
        bytes[i] = raw.charCodeAt(i);
      }
      return bytes;
    }

    function setMode(payload) {
      pinHelperTextarea();
      inputEnabled = !!payload.inputEnabled;
      modeState.reportResize = !!payload.reportResize;
      modeState.fixedCols = Number(payload.fixedCols || 0);
      modeState.fixedRows = Number(payload.fixedRows || 0);
      terminal.options.disableStdin = !inputEnabled;
      terminal.options.cursorBlink = payload.mode === 'focused' && inputEnabled;
      terminal.options.fontSize = payload.mode === 'focused' ? 14 : 11;
      requestAnimationFrame(() => {
        if (!modeState.reportResize && modeState.fixedCols > 0 && modeState.fixedRows > 0) {
          terminal.resize(modeState.fixedCols, modeState.fixedRows);
          lastReportedCols = modeState.fixedCols;
          lastReportedRows = modeState.fixedRows;
          return;
        }
        fitAndReport();
      });
    }

    function applyTerminalSizing() {
      pinHelperTextarea();
      if (!modeState.reportResize && modeState.fixedCols > 0 && modeState.fixedRows > 0) {
        terminal.resize(modeState.fixedCols, modeState.fixedRows);
        lastReportedCols = modeState.fixedCols;
        lastReportedRows = modeState.fixedRows;
        return;
      }
      fitAndReport();
    }

    function writeChunksSequentially(token, chunks, index = 0) {
      if (token !== activeBootstrapToken) {
        return;
      }
      if (index >= chunks.length) {
        return;
      }
      terminal.write(decodeBase64(chunks[index]), () => {
        writeChunksSequentially(token, chunks, index + 1);
      });
    }

    terminal.onData((data) => {
      if (inputEnabled) {
        postMessage('terminalInput', data);
      }
    });

    terminal.textarea?.addEventListener('focus', pinHelperTextarea);

    new ResizeObserver(() => {
      if (!modeState.reportResize) {
        return;
      }
      fitAndReport();
    }).observe(host);

    window.vibeTerminal = {
      setMode,
      reset() {
        terminal.reset();
        activeBootstrapToken += 1;
        applyTerminalSizing();
      },
      replaceBase64Chunks(token, chunks) {
        activeBootstrapToken = Number(token || 0);
        terminal.reset();
        applyTerminalSizing();
        if (!Array.isArray(chunks) || chunks.length === 0) {
          return;
        }
        writeChunksSequentially(activeBootstrapToken, chunks, 0);
      },
      appendBase64Chunks(chunks) {
        for (const chunk of chunks) {
          terminal.write(decodeBase64(chunk));
        }
      }
    };

    fitAndReport();
    pinHelperTextarea();
    postMessage('terminalReady', 'ready');
  </script>
</body>
</html>
